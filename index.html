<html>
  <head>
    <meta charset="utf-8" />

    <title>JavaScript DOM demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>Mes citations</h1>
    <h2>Gestionnaire de citation en ligne</h2>
    <h3>0 citations</h3>
    <hr />

    <form action="" method="" id="form-citation">
      <label for="citation" id="citation-label">Citation</label>
      <input
        type="text"
        id="citation"
        name="citation"
        placeholder="Entrez votre citation ici"
      />
      <label for="author" id="author-label">Autheur</label>
      <input
        type="text"
        id="author"
        name="author"
        placeholder="Entrez un autheur"
      />
      <button type="submit">Soumettre la citation</button>
    </form>
    <hr />
    <div id="quote-list">
      <div class="quote">
        <p class="text">Citation : "On ne naît pas femme, on le devient."</p>
        <p class="author">Autrice : Simone de Beauvoir</p>
      </div>
      <hr />
    </div>
    <!-- Bootstrap JavaScript library -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <!-- Your own JavaScript file -->
    <script src="javascript/application.js"></script>
  </body>
</html>
